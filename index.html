<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        /* DOKŁADNE KOLORY ZE ZDJĘCIA */
        :root {
            --bg-color: #000000;          /* Głęboka czerń tła */
            --input-bg: #121212;          /* Tło pól tekstowych */
            --border-color: #262626;      /* Kolor obramowania pól */
            --btn-blue: #0064e0;          /* Ciemniejszy niebieski przycisku "Zaloguj się" */
            --btn-text: #ffffff;
            --secondary-text: #a8a8a8;    /* Szary tekst (Polski, Meta) */
            --link-blue: #0095f6;         /* Jaśniejszy niebieski dla "Utwórz konto" */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px 25px;
        }

        .lang-top {
            color: var(--secondary-text);
            font-size: 13px;
            margin-top: 10px;
            margin-bottom: 70px;
        }

        .container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        /* LOGO Z TWOJEGO LINKU */
        .insta-logo {
            width: 60px;
            height: 60px;
            background-image: url('https://static.cdninstagram.com/rsrc.php/y4/r/xOP_FkbMZmy.webp');
            background-size: contain;
            background-repeat: no-repeat;
            margin-bottom: 40px;
        }

        /* STYLIZACJA PÓL */
        .input-group {
            width: 100%;
            margin-bottom: 12px;
        }

        input {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px; /* Większe zaokrąglenie jak na screenie */
            padding: 16px;
            color: white;
            font-size: 14px;
            outline: none;
        }

        input::placeholder {
            color: #727272;
        }

        /* PRZYCISK ZALOGUJ SIĘ */
        .login-btn {
            width: 100%;
            background-color: var(--btn-blue);
            color: white;
            border: none;
            border-radius: 25px; /* Bardzo zaokrąglony przycisk */
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 5px;
            cursor: pointer;
        }

        .forgot-link {
            color: white;
            text-decoration: none;
            font-size: 14px;
            margin-top: 25px;
            font-weight: 500;
        }

        /* STOPKA */
        .footer {
            width: 100%;
            max-width: 380px;
            margin-top: auto;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PRZYCISK UTWÓRZ KONTO */
        .create-btn {
            width: 100%;
            background: transparent;
            color: var(--link-blue);
            border: 1px solid var(--link-blue);
            border-radius: 25px;
            padding: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .meta-footer {
            display: flex;
            align-items: center;
            color: var(--secondary-text);
            font-size: 13px;
            font-weight: 500;
        }

        .meta-logo-img {
            width: 16px;
            margin-right: 5px;
            filter: grayscale(1) opacity(0.7);
        }
    </style>
</head>
<body>

    <div class="lang-top">Polski</div>

    <div class="container">
        <div class="insta-logo"></div>
        
        <div class="input-group">
            <input type="text" placeholder="Nazwa użytkownika, adres e-mail lub nume...">
        </div>
        <div class="input-group">
            <input type="password" placeholder="Hasło">
        </div>
        
        <button class="login-btn">Zaloguj się</button>
        
        <a href="#" class="forgot-link">Nie pamiętasz hasła?</a>
    </div>

    <div class="footer">
        <a href="#" class="create-btn">Utwórz nowe konto</a>
        <div class="meta-footer">
            <span style="font-size: 18px; margin-right: 4px;">∞</span> Meta
        </div>
    </div>

</body>
</html>
